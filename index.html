<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="landing">
      <nav>
        <div class="nav__container">
          <img class="logo" src="./assets/Library.png" alt="Library logo" />
          <ul class="nav__links">
            <li><a href="#" class="nav__link">Home</a></li>
            <li><a href="#" class="nav__link">Contact</a></li>
            <li><a href="#" class="nav__link nav__link--primary">Books</a></li>
          </ul>
        </div>
      </nav>
      <header>
        <div class="header__container">
          <div class="header__description">
            <h1>North America's most awarded online library platform</h1>
            <h2>Find your dream book with <span class="cyan">Library</span></h2>
            <button></button>
          </div>
          <figure>
            <img src="./assets/Undraw_Books.png" alt="image of a girl sitting on a stack of books, reading" />
          </figure>
        </div>
      </header>
    </section>
